server {
    listen 80;
    server_name wordpress-nextjs-analytics-dashboard.karmanov.ws;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wordpress-nextjs-analytics-dashboard.karmanov.ws;

    ssl_certificate /etc/letsencrypt/live/wordpress-nextjs-analytics-dashboard.karmanov.ws/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordpress-nextjs-analytics-dashboard.karmanov.ws/privkey.pem;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WordPress REST API
    location /wp-json/ {
        proxy_pass http://wordpress:80/wp-json/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress uploads (if any media is served)
    location /wp-content/uploads/ {
        proxy_pass http://wordpress:80/wp-content/uploads/;
        proxy_set_header Host $host;
    }
}
