name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/hawkeyepierce89/wp-dashboard-frontend
  NGINX_IMAGE: ghcr.io/hawkeyepierce89/wp-dashboard-nginx
  WORDPRESS_IMAGE: ghcr.io/hawkeyepierce89/wp-dashboard-wordpress

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.NGINX_IMAGE }}:latest,${{ env.NGINX_IMAGE }}:${{ github.sha }}

      - name: Build & push wordpress
        uses: docker/build-push-action@v5
        with:
          context: ./wordpress
          push: true
          tags: ${{ env.WORDPRESS_IMAGE }}:latest,${{ env.WORDPRESS_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            APP_DIR=~/wordpress-nextjs-analytics-dashboard

            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/HawkeyePierce89/wordpress-nextjs-analytics-dashboard.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            docker compose -f docker-compose.prod.yml pull frontend nginx wordpress
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sleep 10
            docker compose -f docker-compose.prod.yml ps
