name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t wp-dashboard-frontend -f frontend/Dockerfile.prod frontend/
          docker build -t wp-dashboard-nginx nginx/
          docker build -t wp-dashboard-wordpress wordpress/

      - name: Save and compress images
        run: docker save wp-dashboard-frontend wp-dashboard-nginx wp-dashboard-wordpress | gzip > images.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Transfer images to VPS
        run: scp -i ~/.ssh/key -P ${{ secrets.VPS_PORT }} images.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/images.tar.gz

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            APP_DIR=~/wordpress-nextjs-analytics-dashboard

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/HawkeyePierce89/wordpress-nextjs-analytics-dashboard.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            docker load < /tmp/images.tar.gz
            rm -f /tmp/images.tar.gz

            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            sleep 5
            docker compose -f docker-compose.prod.yml ps
